name: fake_chat_simulator
description: A pixel-perfect fake chat simulator supporting WhatsApp, Messenger, Instagram, and Snapchat.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Screenshot & Export
  screenshot: ^3.0.0
  
  # Gallery & Share
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^7.2.1
  
  # Image Picking
  image_picker: ^1.0.7
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Serialization
  equatable: ^2.0.5
  
  # UI Extras
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # Permissions
  permission_handler: ^11.3.0
  
  # UUID
  uuid: ^4.3.3
  
  # File system
  path_provider: ^2.1.2
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
